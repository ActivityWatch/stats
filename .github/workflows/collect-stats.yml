# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Collect stats

on:
  push:
    branches: [ master ]
  # Don't activate until pushing has been disabled for PRs
  #pull_requests:
  #  branches: [ master ]
  schedule:
    - cron:  '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync
    - name: Collect and append stats
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        uv run python3 collect_stats.py --csv >> data/stats.csv
        # This has started causing "rate-limit exceeded", breaking CI.
        # TODO: Needs to be done smarter.
        #uv run python3 collect_stats.py --releases --csv > data/releases.csv
    - name: Commit
      run: |
        git config --local user.email "noreply@github.com"
        git config --local user.name "GitHub Action"
        git add data/stats.csv
        git commit -m "chore: update stats"
    - name: Push changes
      uses: ad-m/github-push-action@fe38f0a751bf9149f0270cc1fe20bf9156854365
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

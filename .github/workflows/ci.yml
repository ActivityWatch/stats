name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv sync
    - name: Lint (ruff)
      run: uv run ruff check .
    - name: Typecheck (mypy)
      run: uv run mypy *.py
    - name: Test (pytest)
      run: uv run pytest -q
